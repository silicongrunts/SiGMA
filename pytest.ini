[pytest]
testpaths = backend/tests
python_files = test_*.py
asyncio_mode = auto
markers =
    unit: isolated unit tests with mocked external dependencies
    integration: tests that cross service, database, filesystem, or worker boundaries
    route: HTTP route or route-adapter contract tests
    database: migrated SQLite schema, repositories, unit of work, or migrations
    worker: background worker, queue, stream, retry, or recovery tests
    architecture: static dependency boundary and repository structure tests
    security: path safety, permission, input validation, or data-loss prevention tests
    concurrency: concurrent writes, ordering, locking, or race-condition tests
    slow: tests expected to take materially longer than normal unit tests
    regression: tests covering a previously observed bug
